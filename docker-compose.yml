services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sparta-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: sparta-redis
    ports:
      - "6379:6379"

  # ─── 여기 아래부터 우리 애플리케이션 코드를 도커로 연결하는 설정입니다 ───
  
  eureka-server:
    build: ./eureka-server
    container_name: boxoffice-eureka
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    container_name: boxoffice-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      - eureka-server

  user-service:
    build: ./user-service
    container_name: boxoffice-user-service
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db

  # 2. 허브 서비스
  hub-service:
    build: ./hub-service
    container_name: boxoffice-hub-service
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      - DB_HOST=postgres-db
    depends_on:
      - eureka-server
      - postgres-db
      - redis-cache

  # 6. 배송 담당자 서비스
  delivery-manager-service:
    build: ./delivery_manager_service
    container_name: boxoffice-delivery-manager
    ports:
      - "8086:8086"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db

volumes:
  postgres_data: