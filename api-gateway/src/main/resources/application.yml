server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: redis-cache
      port: 6379

  cloud:
    compatibility-verifier:
      enabled: false

    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**
          filters:
            - JwtAuthenticationFilter

        - id: delivery-manager-service
          uri: lb://delivery-manager-service
          predicates:
            - Path=/api/v1/delivery-managers/**
          filters:
            - JwtAuthenticationFilter

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://{keycloak-서버-주소}/realms/boxoffice-realm
